services:
  - type: web
    name: vispend-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 486347902494-mruf16d1kl8n3u8hqv5qtohtd850ib6j.apps.googleusercontent.com
